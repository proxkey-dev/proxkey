[build]
builder = "RAILPACK"
buildCommand = "npm ci && npm run prisma:generate && npm run build"
# Redeploy API only when the Node service changes (not SPA edits under frontend/src).
# Paths are from the Git repo root; drop `frontend/` if this service lives in a frontend-only repo.
watchPatterns = [
  "frontend/server/**",
  "frontend/server/railway.toml",
]

[deploy]
# DB was created outside Prisma Migrate history; `migrate deploy` fails with P3005. Apply schema with
# `railway run --service backend npm exec prisma migrate deploy` after baselining, or run SQL by hand.
startCommand = "npm run start"
# Use /health so older revisions and Railpack defaults align (was /health/ready 404 on stale deploys).
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
