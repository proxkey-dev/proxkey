name: Deploy to Railway

# Deploys the Railway **API** (server/) only. SPA changes under src/ do not trigger this job.
# For the static app, use a separate Railway service with frontend/railway.toml watch patterns
# or the monorepo root Docker deploy (.github/workflows/deploy.yml).
on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'server/railway.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --detach

      - name: Verify health endpoint
        run: |
          echo "Waiting for deployment to stabilise..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.proxkey.dev/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "Deployment verified OK"
