<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="format-detection" content="telephone=no">
  <meta name="format-detection" content="date=no">
  <meta name="format-detection" content="address=no">
  <meta name="format-detection" content="email=no">
  <title>Reset Password - ProxKey</title>
  <style>
    :root{
      --bg1:#0A0A0A; --bg2:#141414; --bg3:#1E1E1E; --card:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.1); --muted: #A8A8A8; --text:#EAEAEA;
      --brand1:#4A90E2; --brand2:#7ED321; --brand3:#F5A623; --danger:#D0021B;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color:var(--text); line-height:1.6; min-height:100vh; padding:20px;
      background: linear-gradient(120deg, #0b0b0b, #141414, #1c1c1c, #0b0b0b);
      background-size: 300% 300%;
      animation: bgshift 12s ease-in-out infinite;
    }
    @keyframes bgshift{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .container{
      max-width: 640px; margin: 0 auto; background: var(--card);
      border:1px solid var(--border); border-radius:16px; overflow:hidden;
      backdrop-filter: blur(24px); box-shadow: 0 8px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
      position: relative;
    }
    .header{
      height:4px; position:relative;
      background: linear-gradient(135deg, var(--brand1) 0%, var(--brand2) 25%, var(--brand3) 50%, var(--danger) 75%, var(--brand1) 100%);
    }
    .content{ padding:40px 30px; text-align:center; }
    .logo{ display:inline-flex; align-items:center; gap:12px; padding:12px 20px;
      border:1px solid var(--border); border-radius:12px; background: rgba(255,255,255,.05); margin-bottom:24px;
    }
    .logo-icon{ width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center;
      color:#fff; font-weight:700; font-size:14px;
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      box-shadow: 0 2px 10px rgba(74,144,226,.35);
    }
    .logo-text{ font-size:24px; font-weight:800; letter-spacing:-.02em; }

    .status-card{
      background: rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
      border-radius:12px; padding:26px; margin: 20px 0; text-align:left;
    }

    .loading-spinner{
      width:24px;height:24px;border:2px solid rgba(74,144,226,.3);
      border-top:2px solid var(--brand1); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 14px;
    }
    @keyframes spin{ to{ transform: rotate(360deg) } }

    .success-icon,.error-icon{
      width:48px;height:48px;border-radius:50%; display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px;
    }
    .success-icon{ border:2px solid var(--brand2); color:var(--brand2); background:rgba(126,211,33,.1); }
    .error-icon{ border:2px solid var(--danger); color:var(--danger); background:rgba(208,2,27,.12); }

    .status-text{ text-align:center; }

    form{ display:grid; gap:14px; margin-top:8px; }
    .field{
      background: rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
      border-radius:12px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between;
    }
    .field input{
      outline:none; border:none; background:transparent; color:var(--text); width:100%;
      font-size:15px;
    }
    .hint{ color:var(--muted); font-size:12px; margin-top:2px }
    .row{ display:flex; gap:10px; align-items:center; justify-content:space-between }
    .btn{
      cursor:pointer; border:none; border-radius:12px; padding:12px 16px; font-weight:700; font-size:15px;
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      color:#0b0b0b; transition: transform .08s ease, filter .2s ease;
      box-shadow: 0 8px 24px rgba(74,144,226,.25);
    }
    .btn:disabled{ opacity:.6; cursor:not-allowed; filter:grayscale(.3) }
    .btn:hover{ transform: translateY(-1px) }
    .btn-secondary{
      background: rgba(255,255,255,.06); color:var(--text); border:1px solid rgba(255,255,255,.08);
      box-shadow:none;
    }

    .meter{ height:8px; background:rgba(255,255,255,.06); border-radius:999px; overflow:hidden }
    .bar{ height:100%; width:0%; background: linear-gradient(90deg, #ff5252, #ffd54f, #7ED321); transition: width .25s ease }

    .footer{
      background: rgba(0,0,0,.18); padding:18px 24px; text-align:center; border-top:1px solid rgba(255,255,255,.06);
      font-size:12px; color:#8A8A8A;
    }
    .footer a{ color:var(--brand1); text-decoration:none }
    .footer a:hover{ color:var(--brand2) }

    @media (max-width:600px){ .content{ padding:30px 20px } }
    .sr{ position:absolute; left:-9999px }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"></div>

    <div class="content">
      <div class="logo">
        <div class="logo-icon">PK</div><div class="logo-text">ProxKey</div>
      </div>

      <div class="status-card">
        <div id="status-content">
          <div class="loading-spinner"></div>
          <p class="status-text" id="status">Preparing secure password reset…</p>
        </div>
      </div>
    </div>

    <div class="footer">
      ProxKey — Ephemeral API Keys for Secure Access •
      <a href="/">Home</a> • <a href="/docs">Docs</a> • <a href="/support">Support</a>
    </div>
  </div>

  <script>
    (function(){
      var target = '/app' + window.location.search + window.location.hash
      window.location.replace(target)
    })()
  </script>
</body>
</html>
