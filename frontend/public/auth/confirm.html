<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="date=no">
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">
    <title>Confirming Email - ProxKey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(120deg, #0b0b0b, #141414, #1c1c1c, #0b0b0b);
            background-size: 300% 300%;
            animation: bgshift 12s ease-in-out infinite;
            color: #EAEAEA;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        
        @keyframes bgshift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(24px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: relative;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            z-index: 1;
        }
        
        .header {
            background: linear-gradient(135deg, #4A90E2 0%, #7ED321 25%, #F5A623 50%, #D0021B 75%, #4A90E2 100%);
            height: 4px;
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.3) 50%, transparent 100%);
        }
        
        .content {
            padding: 40px 30px;
            text-align: center;
        }
        
        .logo-section {
            margin-bottom: 30px;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 20px;
            backdrop-filter: blur(12px);
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #4A90E2, #7ED321);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #FFFFFF;
            letter-spacing: -0.025em;
        }
        
        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            backdrop-filter: blur(8px);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-text {
            font-size: 18px;
            color: #EAEAEA;
            margin: 0;
        }
        
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(74, 144, 226, 0.3);
            border-top: 2px solid #4A90E2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success-icon {
            width: 48px;
            height: 48px;
            background: rgba(126, 211, 33, 0.1);
            border: 2px solid #7ED321;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #7ED321;
            font-size: 24px;
        }
        
        .error-icon {
            width: 48px;
            height: 48px;
            background: rgba(208, 2, 27, 0.1);
            border: 2px solid #D0021B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #D0021B;
            font-size: 24px;
        }
        
        .footer {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .footer p {
            color: #8A8A8A;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .footer a {
            color: #4A90E2;
            text-decoration: none;
        }
        
        .footer a:hover {
            color: #7ED321;
        }
        
        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .content {
                padding: 30px 20px;
            }
            
            .status-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"></div>
        
        <div class="content">
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-icon">PK</div>
                    <div class="logo-text">ProxKey</div>
                </div>
            </div>
            
            <div class="status-card">
                <div id="status-content">
                    <div class="loading-spinner"></div>
                    <p class="status-text" id="status">Confirming your email…</p>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>ProxKey - Ephemeral API Keys for Secure Access</p>
            <p>
                <a href="/">Visit ProxKey</a> | 
                <a href="/docs">Documentation</a> | 
                <a href="/support">Support</a>
            </p>
        </div>
    </div>

    <script>
        (function(){
            var target = '/app' + window.location.search + window.location.hash
            window.location.replace(target)
        })()
    </script>
</body>
</html>
