<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="50" fill="url(#accent)" opacity="0.1"/>
  <circle cx="1100" cy="530" r="80" fill="url(#accent)" opacity="0.1"/>
  <circle cx="1000" cy="150" r="30" fill="url(#accent)" opacity="0.2"/>
  
  <!-- Main content -->
  <g transform="translate(100, 200)">
    <!-- Logo/Brand -->
    <text x="0" y="80" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="url(#accent)">
      ProxKey
    </text>
    
    <!-- Main headline -->
    <text x="0" y="140" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#ffffff">
      Simple, secure API keys
    </text>
    
    <!-- Description -->
    <text x="0" y="200" font-family="Inter, sans-serif" font-size="24" font-weight="400" fill="#a1a1aa">
      Drop-in key management with rate limiting, rotations, and audit logs
    </text>
    
    <!-- Features -->
    <g transform="translate(0, 250)">
      <text x="0" y="30" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#3b82f6">
        ✓ Rate Limiting
      </text>
      <text x="200" y="30" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#3b82f6">
        ✓ Key Rotation
      </text>
      <text x="400" y="30" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#3b82f6">
        ✓ Audit Logs
      </text>
    </g>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)" opacity="0.1"/>
</svg>
